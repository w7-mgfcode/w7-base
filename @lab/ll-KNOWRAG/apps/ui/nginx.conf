server {
    listen 8080;
    server_name localhost;

    # Same-origin proxy: the React app fetches /api/... directly (see
    # apps/ui/src/features/catalog/services/artifactService.ts) so nginx
    # forwards anything under /api/ to the FastAPI backend.
    location /api/ {
        proxy_pass http://knowrag-api:8181;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static SPA bundle. try_files lets the React router handle deep links
    # (refresh on /artifacts/<id> falls back to index.html).
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
