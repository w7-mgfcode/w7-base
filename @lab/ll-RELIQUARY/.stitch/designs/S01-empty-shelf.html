<!-- Atmosphere Micro-interactions Script -->
<script>
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            // Subtle parallax for the background noise could go here, 
            // but we'll stick to a very light radial gradient follow for 'candlelight'
            document.body.style.background = `radial-gradient(circle at ${e.clientX}px ${e.clientY}px, rgba(237, 193, 90, 0.03) 0%, #0b0a08 60%)`;
        });

        // Pulsing animation reset on click for feedback
        const activeSlot = document.querySelector('button[aria-label="Begin — reveal your first relic"]');
        activeSlot.addEventListener('click', () => {
            activeSlot.style.animation = 'none';
            activeSlot.offsetHeight; // trigger reflow
            activeSlot.style.animation = null;
            
            // Log interaction
            console.log('Initiating relic reveal sequence...');
        });
    </script>
