name: Lint

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        continue-on-error: true
        with:
          scandir: '.'
          ignore_paths: 'node_modules @lab/ll-KNOWRAG/apps @ops/grafana/data'
          ignore_names: 'test_init.sh'
          severity: error

  yaml-lint:
    name: yamllint (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: yamllint
        continue-on-error: true
        run: |
          pip install yamllint
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" \
            .github/workflows/ \
            .gitea/workflows/ \
            .shared/workflows/ \
            $(find '@ops' '@dev' '@prod' '@lab' -mindepth 2 -maxdepth 2 -name 'compose.yml' 2>/dev/null) || true
