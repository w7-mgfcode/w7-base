services:
  whoami:
    image: traefik/whoami:latest
    container_name: ${COMPOSE_PROJECT_NAME:-prod-whoami}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.whoami.rule=Host(`whoami.w7.local`)"
      - "traefik.http.services.whoami.loadbalancer.server.port=80"
    networks:
      - w7-ingress
    restart: unless-stopped

networks:
  w7-ingress:
    external: true