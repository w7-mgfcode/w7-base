name: KNOWRAG tests

# Path-filtered unit + component tests for the @lab/ll-KNOWRAG sub-project.
# Triggered by changes under @lab/ll-KNOWRAG/** OR by changes to .shared/**
# (which can affect verify behavior) OR by manual dispatch.
#
# Heavy end-to-end tests (the live-stack `w7 verify` harness) are intentionally
# NOT run here — they require a real Gitea + Qdrant + Ollama stack and are
# operator-driven via `w7 verify @lab/ll-KNOWRAG`.

on:
  push:
    branches: [master, main]
    paths:
      - "@lab/ll-KNOWRAG/**"
      - ".shared/**"
      - ".github/workflows/test-knowrag.yaml"
  pull_request:
    paths:
      - "@lab/ll-KNOWRAG/**"
      - ".shared/**"
      - ".github/workflows/test-knowrag.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  api-tests:
    name: pytest (apps/api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "@lab/ll-KNOWRAG/apps/api"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: "@lab/ll-KNOWRAG/apps/api/requirements.txt"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: pytest
        env:
          PYTHONPATH: src
        run: |
          python -m pytest tests/ -q --tb=short

  ui-tests:
    name: vitest (apps/ui)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "@lab/ll-KNOWRAG/apps/ui"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "@lab/ll-KNOWRAG/apps/ui/package-lock.json"

      - name: Install
        run: npm ci

      - name: Detect tests
        id: detect
        run: |
          if find src -name '*.test.*' -print -quit | grep -q .; then
            echo "has_tests=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_tests=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No vitest specs found under src/ — skipping run."
          fi

      - name: vitest
        if: steps.detect.outputs.has_tests == 'true'
        run: npx vitest run --reporter=default
