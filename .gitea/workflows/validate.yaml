name: W7 Validate

# Local Gitea-side fast-fail. The compose-config job lives in
# .github/workflows/ci.yaml (validate-compose) — duplicating it here would
# double the runner cost without changing the gating story. The policy job
# stays here so a `git push` to local Gitea fails before the act-runner
# spends cycles on `w7 up`.

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  policy:
    name: W7 static policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash .shared/policy/prod-privileged.sh
      - run: bash .shared/policy/prod-no-root-mount.sh
      - run: bash .shared/policy/zone-ingress-naming.sh
