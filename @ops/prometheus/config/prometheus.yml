global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["ops-node-exporter:9100"]

  - job_name: "w7-exporter"
    static_configs:
      - targets: ["ops-w7-exporter:9101"]
