services:
  knowrag-db:
    image: pgvector/pgvector:pg16
    container_name: knowrag-db
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-54322}:5432"
    volumes:
      - ./db/migrations:/docker-entrypoint-initdb.d
      - ./data/db:/var/lib/postgresql/data
    networks:
      - knowrag-net

  knowrag-postgrest:
    image: postgrest/postgrest:latest
    container_name: knowrag-postgrest
    environment:
      - PGRST_DB_URI=postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@knowrag-db:5432/${POSTGRES_DB:-postgres}
      - PGRST_DB_SCHEMA=public
      - PGRST_DB_ANON_ROLE=${PGRST_DB_ANON_ROLE:-postgres}
      - PGRST_JWT_SECRET=${JWT_SECRET}
    ports:
      - "${POSTGREST_PORT:-3000}:3000"
    depends_on:
      - knowrag-db
    networks:
      - knowrag-net

  knowrag-proxy:
    image: nginx:alpine
    container_name: knowrag-proxy
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - knowrag-postgrest
    networks:
      - knowrag-net

  knowrag-api:
    build: ./apps/api
    shm_size: '256m'
    image: knowrag-api:latest
    container_name: knowrag-api
    command: ["uvicorn", "server.main:app", "--host", "0.0.0.0", "--port", "8181", "--log-level", "${LOG_LEVEL:-info}"]
    ports:
      - "${API_PORT:-8181}:8181"
    environment:
      - SUPABASE_URL=${SUPABASE_URL:-http://knowrag-proxy}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - API_PORT=${API_PORT:-8181}
    depends_on:
      - ollama
      - knowrag-postgrest
    networks:
      - knowrag-net

  knowrag-mcp:
    build: ./apps/mcp
    image: knowrag-mcp:latest
    container_name: knowrag-mcp
    ports:
      - "${MCP_PORT:-8051}:8051"
    environment:
      - API_SERVICE_URL=${API_SERVICE_URL:-http://knowrag-api:8181}
      - MCP_PORT=${MCP_PORT:-8051}
    depends_on:
      - knowrag-api
    networks:
      - knowrag-net

  knowrag-ui:
    image: knowrag-ui:latest
    container_name: knowrag-ui
    ports:
      - "${UI_PORT:-3737}:80"
    build:
      context: ./apps/ui
      args:
        VITE_API_BASE_URL: http://localhost:${API_PORT:-8181}
    depends_on:
      - knowrag-api
    networks:
      - knowrag-net

  ollama:
    image: ollama/ollama:latest
    container_name: knowrag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - knowrag-net

networks:
  knowrag-net:
    driver: bridge
