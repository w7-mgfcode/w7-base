name: W7 Deployment Pipeline
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  w7-preflight:
    name: "Preflight System Health"
    runs-on: ubuntu-latest
    steps:
      - name: System Health Check (v2)
        run: |
          echo "[INFO] Running W7 pre-deployment system checks..."
          # The runner has the Docker socket. We perform a minimal 
          # validation of the Docker context to ensure connectivity.
          if ! docker info >/dev/null 2>&1; then
            echo "[ERROR] Docker socket not reachable or permission denied."
            exit 1
          fi
          
      - name: Repository Configuration
        run: |
          echo "[INFO] Verifying repository metadata..."
          # Check for mandatory stack contract files
          if [[ ! -f "compose.yml" ]]; then
            echo "[ERROR] Missing compose.yml in repository root."
            exit 1
          fi

  deploy:
    name: "Production Deployment"
    runs-on: ubuntu-latest
    needs: w7-preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Pre-deploy Validation
        run: |
          echo "[INFO] Validating Docker Compose configuration..."
          # Syntax check before restart
          docker compose config -q
      
      - name: Execute Deployment
        run: |
          # The runner has the Docker socket. It interacts with the 
          # system via standard compose commands.
          #
          # W7-Base Contract: Deployment to @prod via CI requires 
          # non-interactive bypass. Standard 'docker compose up' 
          # is non-interactive by default.
          echo "[INFO] Triggering w7-style deployment..."
          docker compose up -d --remove-orphans
