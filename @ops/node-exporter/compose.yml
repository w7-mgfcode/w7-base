services:
  node-exporter:
    image: prom/node-exporter:latest
    container_name: ops-node-exporter
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)'
    networks:
      - w7-ingress
    restart: unless-stopped

networks:
  w7-ingress:
    external: true
