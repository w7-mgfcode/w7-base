services:
  knowrag-api:
    build: ./apps/api
    shm_size: '256m'
    image: knowrag-api:latest
    container_name: knowrag-api
    command: ["uvicorn", "server.main:app", "--host", "0.0.0.0", "--port", "8181", "--log-level", "${LOG_LEVEL:-info}"]
    ports:
      - "${API_PORT:-8181}:8181"
    environment:
      - QDRANT_HOST=${QDRANT_HOST:-qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - API_PORT=${API_PORT:-8181}
    depends_on:
      - ollama
      - qdrant
    networks:
      - knowrag-net

  knowrag-mcp:
    build: ./apps/mcp
    image: knowrag-mcp:latest
    container_name: knowrag-mcp
    ports:
      - "${MCP_PORT:-8051}:8051"
    environment:
      - API_SERVICE_URL=${API_SERVICE_URL:-http://knowrag-api:8181}
      - MCP_PORT=${MCP_PORT:-8051}
    depends_on:
      - knowrag-api
    networks:
      - knowrag-net

  knowrag-ui:
    image: knowrag-ui:latest
    container_name: knowrag-ui
    ports:
      - "${UI_PORT:-3737}:80"
    build:
      context: ./apps/ui
      args:
        VITE_API_BASE_URL: http://localhost:${API_PORT:-8181}
    depends_on:
      - knowrag-api
    networks:
      - knowrag-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: knowrag-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - knowrag-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: knowrag-webui
    ports:
      - "${WEBUI_PORT:-3000}:8080"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
    depends_on:
      - ollama
    volumes:
      - ./data/open-webui:/app/backend/data
    networks:
      - knowrag-net

  ollama:
    image: ollama/ollama:latest
    container_name: knowrag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ./data/ollama:/root/.ollama
    networks:
      - knowrag-net

networks:
  knowrag-net:
    driver: bridge
