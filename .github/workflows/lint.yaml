name: Lint

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  shellcheck:
    name: ShellCheck on .bin and .shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          ignore_paths: 'node_modules @lab/ll-KNOWRAG/apps @ops/grafana/data'
          severity: warning

  yaml-lint:
    name: yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: yamllint
        run: |
          pip install yamllint
          # Loose config: warnings only, allow long lines (compose label DSL)
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}}}" \
            .github/workflows/ \
            .gitea/workflows/ \
            .shared/workflows/ \
            @ops/*/compose.yml \
            @dev/*/compose.yml \
            @prod/*/compose.yml \
            @lab/*/compose.yml || true
